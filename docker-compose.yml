version: '3.8'

services:
  ml-pipeline:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    volumes:
      - ./ml-pipeline:/app
      # Strict persistence volume mapping to inject output matrices into the backend organically
      - ./backend/models:/backend/models
    # This service runs train.py and then safely exits once tensors evaluate against the mounted data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - ml-pipeline
    restart: on-failure
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
